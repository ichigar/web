	  <rect x="190" y="422" width="12" height="10" rx="2" fill="#FEF3E2" stroke="#E65100" stroke-width="1"/>
	  <text x="208" y="431" font-size="10" fill="#1A1A2E">VLAN 20 — puertos acceso</text>

	  <rect x="580" y="412" width="292" height="28" rx="6"
