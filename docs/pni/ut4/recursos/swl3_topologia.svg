  <!-- Cables PC→SW -->
  <line x1="178" y1="146" x2="326" y2="200" stroke="#1565C0" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="178" y1="266" x2="326" y2="210" stroke="#1565C0" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="722" y1="146" x2="574" y2="200" stroke="#E65100" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="722" y1="266" x2="574" y2="210" stroke="#E65100" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Puerto enrutado hacia router externo -->
	  <rect x="380" y="348" width="140" height="52" rx="8"
	        fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
	  <text x="450" y="366" text-anchor="middle" font-size="9" font-weight="700" fill="#475569">Gi0/1 — puerto enrutado</text>
	  <text x="450" y="380" text-anchor="middle" font-size="9" fill="#1E3A5F"
	        font-family="'Cascadia Code','Courier New',monospace">10.0.0.1/30</text>
	  <text x="450" y="394" text-anchor="middle" font-size="8" fill="#64748B">no switchport</text>

  <!-- Línea SW→puerto enrutado -->
	  <line x1="450" y1="320" x2="450" y2="348" stroke="#334155" stroke-width="2"
	        marker-end="url(#arrow)"/>

  <!-- Router externo -->
  <g filter="url(#shadow)">
	    <rect x="368" y="408" width="164" height="36" rx="8"
