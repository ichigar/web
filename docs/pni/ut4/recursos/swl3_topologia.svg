	  </g>
	  <text x="450" y="426" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A5F">ROUTER / SW_L3 vecino</text>
	  <text x="450" y="439" text-anchor="middle" font-size="9" fill="#64748B"
	        font-family="'Cascadia Code','Courier New',monospace">10.0.0.2/30 — otras redes</text>

  <!-- Leyenda -->
	  <rect x="28" y="412" width="320" height="28" rx="6"
	        fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
	  <rect x="44" y="422" width="12" height="10" rx="2" fill="#DDEEF9" stroke="#1565C0" stroke-width="1"/>
