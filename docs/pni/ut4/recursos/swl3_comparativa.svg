  <text x="158" y="224" text-anchor="middle" font-size="10" font-weight="600" fill="#1E3A5F">ROUTER</text>

  <!-- dos cables físicos distintos -->
  <line x1="128" y1="118" x2="108" y2="174" stroke="#1565C0" stroke-width="2"/>
  <line x1="188" y1="118" x2="208" y2="174" stroke="#E65100" stroke-width="2"/>
  <rect x="46" y="138" width="52" height="16" rx="3" fill="white" fill-opacity="0.9"/>
  <text x="72" y="149" text-anchor="middle" font-size="8" fill="#1565C0"
