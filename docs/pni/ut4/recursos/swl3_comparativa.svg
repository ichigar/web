  <rect x="198" y="138" width="52" height="16" rx="3" fill="white" fill-opacity="0.9"/>
  <text x="224" y="149" text-anchor="middle" font-size="8" fill="#E65100"
        font-family="'Cascadia Code','Courier New',monospace">Fa0/1 V20</text>

