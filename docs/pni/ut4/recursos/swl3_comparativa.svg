  <!-- flecha interna enrutamiento -->
  <path d="M 735 162 C 735 148 751 148 751 162" stroke="#334155" stroke-width="1.5"
        fill="none" marker-end="url(#arrow)"/>
  <text x="743" y="145" text-anchor="middle" font-size="7" fill="#334155" font-weight="600">interno</text>

  <!-- hosts -->
  <g filter="url(#shadow)">
    <rect x="634" y="84" width="44" height="30" rx="5"
