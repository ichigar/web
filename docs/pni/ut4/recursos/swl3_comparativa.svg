  <text x="68" y="280" font-size="9" fill="#64748B">+ Simple de entender</text>
  <text x="68" y="294" font-size="9" fill="#E65100">— 1 puerto físico por VLAN</text>
  <text x="68" y="308" font-size="9" fill="#E65100">— No escala</text>
	  <text x="68" y="316" font-size="9" fill="#64748B">Uso: laboratorio introductorio</text>

  <!-- ══ MÉTODO 2: Router-on-a-stick ══ -->
  <rect x="321" y="52" width="258" height="280" rx="10"
