  <text x="539" y="107" text-anchor="middle" font-size="8" font-weight="600" fill="#1E3A5F">PC V20</text>
  <line x1="539" y1="120" x2="509" y2="100" stroke="#E65100" stroke-width="1" stroke-opacity="0.5"/>

  <!-- flecha ida y vuelta cuello botella -->
  <path d="M 421 156 C 380 156 370 230 421 230" stroke="#E65100" stroke-width="1.5"
