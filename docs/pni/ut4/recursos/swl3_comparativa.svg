  <!-- ══ MÉTODO 1: Router físico por puerto ══ -->
  <rect x="28" y="52" width="258" height="280" rx="10"
        fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
  <text x="157" y="72" text-anchor="middle" font-size="11" font-weight="700"
