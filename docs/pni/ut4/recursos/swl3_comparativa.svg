  </g>
  <text x="656" y="103" text-anchor="middle" font-size="8" font-weight="600" fill="#1E3A5F">PC V10</text>
  <line x1="656" y1="114" x2="668" y2="120" stroke="#1565C0" stroke-width="1" stroke-opacity="0.5"/>

  <g filter="url(#shadow)">
    <rect x="808" y="84" width="44" height="30" rx="5"
          fill="#EFF6FF" stroke="#E65100" stroke-width="1"/>
  </g>
  <text x="830" y="103" text-anchor="middle" font-size="8" font-weight="600" fill="#1E3A5F">PC V20</text>
  <line x1="830" y1="114" x2="818" y2="120" stroke="#E65100" stroke-width="1" stroke-opacity="0.5"/>

  <rect x="644" y="248" width="200" height="72" rx="6"
        fill="white" stroke="#1565C0" stroke-width="1"/>
  <text x="744" y="264" text-anchor="middle" font-size="9" font-weight="700" fill="#1565C0">Características</text>
  <text x="654" y="280" font-size="9" fill="#64748B">+ Enrutamiento en hardware</text>
  <text x="654" y="294" font-size="9" fill="#64748B">+ Sin cuello de botella</text>
  <text x="654" y="308" font-size="9" fill="#64748B">+ Topología más simple</text>
  <text x="654" y="316" font-size="9" fill="#64748B">Uso: empresa mediana/grande</text>

  <!-- Leyenda inferior -->
  <rect x="28" y="346" width="844" height="26" rx="6"
        fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="48" y="363" font-size="10" fill="#1A1A2E" font-weight="600">★ </text>
  <text x="60" y="363" font-size="10" fill="#1A1A2E">El switch L3 elimina el cuello de botella procesando el enrutamiento internamente, sin necesidad de un router externo.</text>
</svg>
