  <rect x="714" y="114" width="9" height="6" rx="1" fill="#F1F5F9" stroke="#475569" stroke-width="0.8"/>
  <circle cx="806" cy="117" r="2.5" fill="#22C55E"/>
  <circle cx="816" cy="117" r="2.5" fill="#F59E0B"/>
  <text x="743" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#1E3A5F">SW L3</text>
  <!-- SVIs internas -->
  <rect x="659" y="152" width="76" height="38" rx="4"
        fill="#DDEEF9" stroke="#1565C0" stroke-width="1"/>
  <text x="697" y="166" text-anchor="middle" font-size="8" font-weight="700" fill="#1565C0">SVI V10</text>
  <text x="697" y="180" text-anchor="middle" font-size="8" fill="#1E3A5F"
        font-family="'Cascadia Code','Courier New',monospace">.10.1/24</text>
  <rect x="751" y="152" width="76" height="38" rx="4"
