  </g>
  <!-- puertos -->
  <rect x="662" y="114" width="9" height="6" rx="1" fill="#DDEEF9" stroke="#1565C0" stroke-width="0.8"/>
  <rect x="675" y="114" width="9" height="6" rx="1" fill="#DDEEF9" stroke="#1565C0" stroke-width="0.8"/>
  <rect x="688" y="114" width="9" height="6" rx="1" fill="#FEF3E2" stroke="#E65100" stroke-width="0.8"/>
