  <text x="451" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#1E3A5F">SW L2</text>

  <!-- Router -->
  <g filter="url(#shadow)">
    <rect x="361" y="174" width="180" height="40" rx="8"
