  <text x="335" y="196" font-size="8" fill="#E65100" font-weight="600">cuello</text>
  <text x="335" y="207" font-size="8" fill="#E65100" font-weight="600">botella</text>

  <rect x="351" y="248" width="200" height="72" rx="6"
        fill="white" stroke="#CBD5E1" stroke-width="1"/>
  <text x="451" y="264" text-anchor="middle" font-size="9" font-weight="700" fill="#475569">Características</text>
  <text x="361" y="280" font-size="9" fill="#64748B">+ Solo 1 enlace físico</text>
  <text x="361" y="294" font-size="9" fill="#64748B">+ Económico en puertos</text>
  <text x="361" y="308" font-size="9" fill="#E65100">— Router = cuello de botella</text>
  <text x="361" y="316" font-size="9" fill="#64748B">Uso: PYME pequeña</text>

  <!-- ══ MÉTODO 3: Switch L3 ══ -->
  <rect x="614" y="52" width="258" height="280" rx="10"
