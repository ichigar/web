<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recetas a la Compra · recetas antiinflamatorias y lista de la compra</title>
  <meta name="description" content="Recetas a la Compra: recetas antiinflamatorias con generador de lista de la compra.">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="180x180" href="favicon.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#3f7d4e">
  <!-- PWA: instalable y offline (se sirve por HTTPS, p. ej. en Codeberg Pages). -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Recetas a la Compra">
  <link rel="stylesheet" href="styles.css">
  <!-- Aplica el tema guardado antes de pintar, para evitar el parpadeo claro→oscuro. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("recetario.tema");
        if (t === "claro" || t === "oscuro") document.documentElement.setAttribute("data-tema", t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="cabecera">
    <div class="cabecera-inner">
      <div class="cab-fila">
        <h1 class="logo" id="ir-inicio" data-ico="logo"><span class="logo-txt">Recetas a la Compra</span></h1>
        <button class="btn-tema" id="btn-tema" aria-label="Cambiar tema"></button>
        <div class="menu-wrap">
          <button class="btn-menu" id="abrir-menu" aria-label="Menú" aria-haspopup="true" aria-expanded="false" data-ico="menu"></button>
          <nav class="menu" id="menu" hidden>
          <button class="menu-item" data-menu="inicio" data-ico="home">Inicio</button>
          <button class="menu-item" data-menu="nueva" data-ico="plus_circle">Nueva receta</button>
          <button class="menu-item" data-menu="menu" data-ico="calendario">Menú semanal</button>
          <button class="menu-item" data-menu="seleccion" data-ico="list">Recetas seleccionadas</button>
          <button class="menu-item" data-menu="compra" data-ico="cart">Lista de la compra</button>
          <button class="menu-item" data-menu="vaciar" data-ico="trash">Vaciar selección</button>
          <hr class="menu-sep">
          <button class="menu-item" data-menu="guia" data-ico="help">Cómo usar la app</button>
          <button class="menu-item" data-menu="instalar" data-ico="download">Instalar como app</button>
          </nav>
        </div>
      </div>
      <div class="buscador zona-buscador-full" id="zona-buscador">
        <input type="search" id="buscar" placeholder="Buscar receta o ingredientes…" autocomplete="off">
        <div class="filtros-cat">
          <select class="filtro-categoria" aria-label="Filtrar por categoría 1">
            <option value="">Categoría…</option>
          </select>
          <select class="filtro-categoria" aria-label="Filtrar por categoría 2">
            <option value="">+ Categoría…</option>
          </select>
          <select class="filtro-categoria" aria-label="Filtrar por categoría 3">
            <option value="">+ Categoría…</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <main class="contenido">
    <!-- Vista: listado -->
    <section id="vista-listado">
      <p class="contador" id="contador"></p>
      <div class="grid-recetas" id="grid"></div>
    </section>

    <!-- Vista: detalle -->
    <section id="vista-detalle" hidden></section>

    <!-- Vista: edición de receta -->
    <section id="vista-edicion" hidden></section>

    <!-- Vista: recetas seleccionadas -->
    <section id="vista-seleccion" hidden></section>

    <!-- Vista: lista de la compra -->
    <section id="vista-compra" hidden></section>

    <!-- Vista: ayuda / cómo instalar la PWA -->
    <section id="vista-ayuda" hidden></section>

    <!-- Vista: guía de uso de la app -->
    <section id="vista-guia" hidden></section>

    <!-- Vista: menú semanal -->
    <section id="vista-menu" hidden></section>
  </main>

  <!-- Barra inferior con la selección -->
  <div class="barra-seleccion" id="barra-seleccion" hidden>
    <button class="enlace-clear" id="vaciar-seleccion">Vaciar</button>
    <button class="resumen-btn" id="resumen-seleccion" aria-label="Ver recetas seleccionadas">0 seleccionadas</button>
    <button class="btn-primario" id="ver-lista" data-ico="cart" data-ico-side="end">Generar lista</button>
  </div>

  <!-- Modal reutilizable (selector de receta, selector de día/comida, etc.) -->
  <div class="modal-fondo" id="modal" hidden></div>

  <script type="module" src="app.js"></script>
  <script>
    // Registro del service worker (PWA). Solo bajo HTTPS, así no se activa al
    // servir en local con servidor.py (http) ni durante los tests E2E.
    if ("serviceWorker" in navigator && location.protocol === "https:") {
      window.addEventListener("load", () =>
        navigator.serviceWorker.register("sw.js").catch(() => {})
      );
    }
  </script>
</body>
</html>
